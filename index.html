<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 Fredriks Todo Lists</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e8e8f0;
            font-size: 16px;
            line-height: 1.5;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 {
            text-align: center;
            color: #00d4ff;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #8888a0;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(157,78,221,0.1));
            border: 1px solid #222233;
            border-radius: 10px;
            padding: 16px;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
        }
        .stat-label {
            font-size: 12px;
            color: #8888a0;
            margin-top: 4px;
        }
        .list-card {
            background: #16161f;
            border: 1px solid #222233;
            border-radius: 10px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: #111118;
            cursor: pointer;
            border-bottom: 1px solid #222233;
        }
        .list-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .list-icon {
            font-size: 24px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1c1c28;
            border-radius: 8px;
        }
        .list-name {
            font-weight: 600;
            font-size: 18px;
        }
        .list-meta {
            font-size: 12px;
            color: #8888a0;
        }
        .toggle-btn {
            font-size: 12px;
            color: #8888a0;
        }
        .list-items {
            padding: 12px;
        }
        .todo-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 6px;
            background: #111118;
        }
        .todo-item.completed {
            opacity: 0.5;
        }
        .todo-item.completed .item-text {
            text-decoration: line-through;
            color: #8888a0;
        }
        .checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #555570;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }
        .checkbox.checked {
            background: #00ff88;
            border-color: #00ff88;
        }
        .checkbox.checked::after {
            content: '✓';
            color: #0a0a0f;
            font-size: 12px;
            font-weight: bold;
        }
        .item-text {
            flex: 1;
        }
        .btn-clear {
            background: #ff006e22;
            color: #ff006e;
            border: 1px solid #ff006e;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-refresh {
            background: #00d4ff22;
            color: #00d4ff;
            border: 1px solid #00d4ff;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        .empty-state {
            text-align: center;
            padding: 30px;
            color: #555570;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #00d4ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Fredriks Lists</h1>
        <p class="subtitle">Synkade med Telegram</p>
        
        <div id="summary" class="summary">
            <div class="loading">Laddar...</div>
        </div>
        
        <div style="text-align: center; margin-bottom: 20px;">
            <button class="btn-refresh" onclick="location.reload()">
                🔄 Ladda om
            </button>
        </div>
        
        <div id="lists"></div>
    </div>

    <script>
        // ── DATA ──
        const DATA_KEY = 'fredriks_lists_v1';
        
        let lists = {};
        let expanded = new Set(['handla']);
        
        // ── INIT ──
        function init() {
            console.log('Initializing app...');
            loadData();
            render();
            console.log('App initialized with lists:', Object.keys(lists));
        }
        
        // ── LOAD DATA ──
        function loadData() {
            try {
                // Try localStorage first
                const saved = localStorage.getItem(DATA_KEY);
                if (saved) {
                    lists = JSON.parse(saved);
                    console.log('Loaded from localStorage');
                    return;
                }
            } catch (e) {
                console.log('localStorage not available');
            }
            
            // Default data
            lists = {
                handla: {
                    id: 'handla',
                    name: 'Handla',
                    icon: '🛒',
                    color: '#00d4ff',
                    items: [
                        {id: 'h1', text: 'monster', completed: false, createdAt: new Date().toISOString()},
                        {id: 'h2', text: 'mjölk', completed: false, createdAt: new Date().toISOString()},
                        {id: 'h3', text: 'bröd', completed: false, createdAt: new Date().toISOString()}
                    ]
                },
                jobb: {
                    id: 'jobb',
                    name: 'Jobb',
                    icon: '💼',
                    color: '#ffaa00',
                    items: []
                },
                dagsplanering: {
                    id: 'dagsplanering',
                    name: 'Dagsplanering',
                    icon: '📅',
                    color: '#9d4edd',
                    items: [
                        {id: 'd1', text: 'Köra bil till 15:00', completed: false, createdAt: new Date().toISOString()},
                        {id: 'd2', text: 'Vila 15:30-16:00', completed: false, createdAt: new Date().toISOString()},
                        {id: 'd3', text: 'Plocka hemma', completed: false, createdAt: new Date().toISOString()},
                        {id: 'd4', text: 'Hämta Mira på jobbet', completed: false, createdAt: new Date().toISOString()},
                        {id: 'd5', text: 'Åk 17:00', completed: false, createdAt: new Date().toISOString()}
                    ]
                }
            };
            
            saveData();
            console.log('Created default lists');
        }
        
        // ── SAVE DATA ──
        function saveData() {
            try {
                localStorage.setItem(DATA_KEY, JSON.stringify(lists));
            } catch (e) {
                console.error('Could not save:', e);
            }
        }
        
        // ── RENDER ──
        function render() {
            console.log('Rendering...');
            renderSummary();
            renderLists();
        }
        
        function renderSummary() {
            const el = document.getElementById('summary');
            const total = Object.values(lists).reduce((s, l) => s + l.items.length, 0);
            const done = Object.values(lists).reduce((s, l) => s + l.items.filter(i => i.completed).length, 0);
            const active = Object.values(lists).filter(l => l.items.length > 0).length;
            
            el.innerHTML = `
                <div class="stat">
                    <div class="stat-value" style="color: #00d4ff">${active}</div>
                    <div class="stat-label">Listor</div>
                </div>
                <div class="stat">
                    <div class="stat-value" style="color: #ffaa00">${total - done}</div>
                    <div class="stat-label">Att göra</div>
                </div>
                <div class="stat">
                    <div class="stat-value" style="color: #00ff88">${done}</div>
                    <div class="stat-label">Klara</div>
                </div>
            `;
        }
        
        function renderLists() {
            const container = document.getElementById('lists');
            container.innerHTML = Object.values(lists).map(list => {
                const done = list.items.filter(i => i.completed).length;
                const isOpen = expanded.has(list.id);
                
                return `
                    <div class="list-card">
                        <div class="list-header" onclick="toggleList('${list.id}')">
                            <div class="list-title">
                                <div class="list-icon">${list.icon}</div>
                                <div>
                                    <div class="list-name">${list.name}</div>
                                    <div class="list-meta">${done}/${list.items.length} klara</div>
                                </div>
                            </div>
                            <span class="toggle-btn">${isOpen ? '▲' : '▼'}</span>
                        </div>
                        
                        ${isOpen ? `
                            <div class="list-items">
                                ${list.items.length === 0 ? `
                                    <div class="empty-state">Inga items än</div>
                                ` : list.items.map(item => `
                                    <div class="todo-item ${item.completed ? 'completed' : ''}">
                                        <div class="checkbox ${item.completed ? 'checked' : ''}" 
                                             onclick="event.stopPropagation(); toggleItem('${list.id}', '${item.id}')">
                                        </div>
                                        <span class="item-text">${escapeHtml(item.text)}</span>
                                    </div>
                                `).join('')}
                                
                                ${done > 0 ? `
                                    <div style="padding: 10px; text-align: center;">
                                        <button class="btn-clear" onclick="event.stopPropagation(); clearCompleted('${list.id}')">
                                            🧹 Rensa ${done} klara
                                        </button>
                                    </div>
                                ` : ''}
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }
        
        // ── ACTIONS ──
        window.toggleList = function(id) {
            if (expanded.has(id)) {
                expanded.delete(id);
            } else {
                expanded.add(id);
            }
            renderLists();
        };
        
        window.toggleItem = function(listId, itemId) {
            const item = lists[listId].items.find(i => i.id === itemId);
            if (item) {
                item.completed = !item.completed;
                saveData();
                render();
            }
        };
        
        window.clearCompleted = function(listId) {
            const list = lists[listId];
            const done = list.items.filter(i => i.completed);
            if (done.length === 0) return;
            
            if (confirm(`Rensa ${done.length} avbockade items?`)) {
                list.items = list.items.filter(i => !i.completed);
                saveData();
                render();
            }
        };
        
        // ── HELPERS ──
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ── START ──
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
